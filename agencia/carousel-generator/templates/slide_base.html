<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@400;700;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cream: #F5F0E8;
    --black: #1A1A1A;
    --white: #FFFFFF;
    --accent: #C4611A;
    --accent-light: #E8885A;
    --muted: #6B6056;
  }

  body {
    width: 1080px;
    height: 1350px;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: {{BACKGROUND}};
    font-family: 'Inter', sans-serif;
  }

  .slide {
    width: 100%;
    height: 100%;
    padding: 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
  }

  .slide-number {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 22px;
    color: {{TEXT_MUTED}};
    letter-spacing: 2px;
  }

  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 32px;
  }

  .headline {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    font-size: 88px;
    line-height: 1.0;
    color: {{TEXT_COLOR}};
    text-transform: uppercase;
    letter-spacing: -2px;
  }

  .headline em {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-weight: 400;
    text-transform: none;
    color: var(--accent);
  }

  .subheadline {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 36px;
    line-height: 1.4;
    color: {{TEXT_COLOR}};
    opacity: 0.85;
    max-width: 800px;
  }

  .body-text {
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    font-size: 28px;
    line-height: 1.6;
    color: {{TEXT_COLOR}};
    opacity: 0.75;
    max-width: 860px;
  }

  .accent-line {
    width: 80px;
    height: 4px;
    background: var(--accent);
  }

  .footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .handle {
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 22px;
    color: {{TEXT_COLOR}};
    opacity: 0.5;
    letter-spacing: 1px;
  }

  .dots {
    display: flex;
    gap: 8px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: {{TEXT_COLOR}};
    opacity: 0.2;
  }

  .dot.active {
    opacity: 1;
    background: var(--accent);
    width: 28px;
    border-radius: 5px;
  }

  /* Variantes de fondo */
  .bg-cream { background: var(--cream); }
  .bg-black { background: var(--black); }
  .bg-white { background: var(--white); }
  .bg-accent { background: var(--accent); }

  /* Elemento decorativo */
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    opacity: 0.06;
  }
</style>
</head>
<body class="bg-{{BG_CLASS}}">
<div class="slide">

  <div class="slide-number">{{SLIDE_NUM}} / 08</div>

  <div class="content">
    <div class="accent-line"></div>
    <h1 class="headline">{{HEADLINE}}</h1>
    <p class="subheadline">{{SUBHEADLINE}}</p>
    {{BODY_BLOCK}}
  </div>

  <div class="footer">
    <span class="handle">@CristinaPerisAI</span>
    <div class="dots">
      {{DOTS}}
    </div>
  </div>

</div>
</body>
</html>
